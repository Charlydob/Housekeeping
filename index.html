<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08111f" />
  <title>Housekeeping</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Housekeeping</p>
        <h1 id="hotelTitle">Hotel</h1>
      </div>
      <button id="syncButton" class="icon-btn" type="button" aria-label="Sincronizar">↻</button>
    </header>

    <section id="roomsView" class="app-view" aria-label="Vista principal">
      <section class="summary-card" aria-label="Resumen">
        <div class="summary-top">
          <div>
            <p class="label">Progreso activo</p>
            <strong id="globalPercent">0%</strong>
          </div>
          <div class="summary-stats">
            <span class="stat todo"><b id="todoCount">0</b><small>limpiar</small></span>
            <span class="stat occupied"><b id="occupiedCount">0</b><small>ocupadas</small></span>
            <span class="stat clean"><b id="cleanCount">0</b><small>limpiadas</small></span>
          </div>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="globalBar" class="progress-fill"></div>
        </div>
        <p id="progressHint" class="progress-hint">Calcula solo habitaciones LIMPIAR y tareas activas de OCUPADA.</p>
      </section>

      <nav class="hotel-tabs-wrap" aria-label="Hoteles">
        <div id="hotelTabs" class="hotel-tabs"></div>
        <button id="addHotelButton" class="mini-btn add" type="button">+ Hotel</button>
      </nav>

      <section class="toolbar" aria-label="Acciones">
        <button id="addRoomButton" class="primary-btn" type="button">+ Habitación</button>
        <button id="templateButton" class="soft-btn" type="button">⚙️ Plantilla</button>
        <button id="statsButton" class="soft-btn" type="button">📊 Estadísticas</button>
        <button id="deleteHotelButton" class="soft-danger-btn" type="button">Borrar hotel</button>
      </section>

      <main id="rooms" class="rooms" aria-label="Habitaciones"></main>

      <footer class="footer">
        <button id="resetButton" class="danger-link" type="button">Reiniciar local</button>
        <p id="statusMessage">Listo.</p>
      </footer>
    </section>

    <section id="statsView" class="app-view hidden" aria-label="Vista de estadísticas">
      <div class="stats-view-head">
        <button id="backToRoomsButton" class="soft-btn stats-back-btn" type="button">← Habitaciones</button>
      </div>
      <section class="template-panel stats-panel" aria-label="Estadísticas">
        <div class="panel-head">
          <div>
            <p class="label">Rendimiento</p>
            <h2>Estadísticas</h2>
          </div>
        </div>
        <div id="statsContent" class="stats-content"></div>
      </section>
    </section>
  </div>

  <div id="templateModal" class="modal-backdrop hidden" aria-hidden="true">
    <section class="modal-card modal-sheet" aria-labelledby="templateModalTitle" aria-modal="true" role="dialog">
      <div class="panel-head">
        <div>
          <p class="label">Plantilla del hotel</p>
          <h2 id="templateModalTitle">Tareas</h2>
        </div>
        <button id="closeTemplateButton" class="icon-btn small" type="button" aria-label="Cerrar">×</button>
      </div>

      <div id="templatePanel" class="template-panel modal-panel" aria-label="Plantilla de tareas">
        <div id="taskEditorList" class="task-editor-list"></div>

        <form id="addTaskForm" class="add-task-form">
          <input id="taskEmojiInput" maxlength="4" placeholder="🧽" aria-label="Emoji" />
          <input id="taskLabelInput" placeholder="Nueva tarea" aria-label="Nombre de tarea" />
          <label class="occupied-toggle">
            <input id="taskOccupiedInput" type="checkbox" checked />
            <span>OCUPADA</span>
          </label>
          <button class="mini-btn add" type="submit">Añadir</button>
        </form>
      </div>
    </section>
  </div>

  <div id="hotelModal" class="modal-backdrop hidden" aria-hidden="true">
    <section class="modal-card" aria-labelledby="hotelModalTitle" aria-modal="true" role="dialog">
      <div class="panel-head">
        <div>
          <p class="label">Hotel</p>
          <h2 id="hotelModalTitle">Añadir hotel</h2>
        </div>
        <button id="closeHotelModalButton" class="icon-btn small" type="button" aria-label="Cerrar">×</button>
      </div>
      <form id="hotelForm" class="room-edit-form">
        <label class="modal-field">
          <span>Nombre del hotel</span>
          <input id="hotelNameInput" type="text" required />
        </label>
        <label class="occupied-toggle modal-check">
          <input id="hotelCopyTemplateInput" type="checkbox" checked />
          <span>Copiar plantilla del hotel actual</span>
        </label>
        <div class="modal-actions">
          <button id="cancelHotelModalButton" class="soft-btn" type="button">Cancelar</button>
          <button class="primary-btn" type="submit">Guardar</button>
        </div>
      </form>
    </section>
  </div>

  <div id="roomEditModal" class="modal-backdrop hidden" aria-hidden="true">
    <section class="modal-card" aria-labelledby="roomEditTitle" aria-modal="true" role="dialog">
      <div class="panel-head">
        <div>
          <p class="label">Habitación</p>
          <h2 id="roomEditTitle">Editar</h2>
        </div>
        <button id="closeRoomEditModalButton" class="icon-btn small" type="button" aria-label="Cerrar">×</button>
      </div>

      <form id="roomEditForm" class="room-edit-form">
        <input id="roomEditIdInput" type="hidden" />
        <input id="roomEditHotelIdInput" type="hidden" />

        <label class="modal-field">
          <span>Número o nombre</span>
          <input id="roomEditNumberInput" type="text" required />
        </label>

        <label class="modal-field">
          <span>Grupo o piso</span>
          <input id="roomEditGroupInput" type="text" />
        </label>

        <div class="modal-actions">
          <button id="cancelRoomEditButton" class="soft-btn" type="button">Cancelar</button>
          <button id="saveRoomEditButton" class="primary-btn" type="submit">Guardar</button>
        </div>
      </form>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
